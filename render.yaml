services:
  - type: web
    name: discord-command-center
    runtime: python
    plan: free
    rootDir: discord_agent
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DISCORD_TOKEN
        sync: false
      - key: CONTROL_SERVER_ID
        sync: false
      - key: CONTROL_CHANNEL_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: discord_agent_db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: BULK_PROMO_ENABLED
        value: "true"
      - key: PROMO_MAX_CHANNELS
        value: "100"
      - key: LOG_LEVEL
        value: INFO

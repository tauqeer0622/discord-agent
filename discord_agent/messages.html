<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Messages</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#07090f;
    --bg2:#0d1117;
    --card:rgba(255,255,255,.04);
    --border:rgba(255,255,255,.08);
    --purple:#7c3aed;
    --blue:#2563eb;
    --text:#f1f5f9;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 10% 10%, rgba(124,58,237,.15), transparent 35%),
        radial-gradient(circle at 90% 90%, rgba(37,99,235,.15), transparent 35%);
    pointer-events:none;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.title{
    font-size:32px;
    font-weight:800;
}

.subtitle{
    color:var(--muted);
    margin-top:5px;
}

.back-btn{
    text-decoration:none;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    background:linear-gradient(135deg,var(--purple),var(--blue));
    font-weight:600;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:30px;
}

.stat{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
}

.stat-value{
    font-size:30px;
    font-weight:800;
}

.stat-label{
    color:var(--muted);
    margin-top:5px;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search{
    width:350px;
    padding:12px 15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:var(--bg2);
    color:white;
}

.refresh{
    color:var(--muted);
    font-size:14px;
}

.messages{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.message-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:12px;
    transition:.2s;
}

.message-card:hover{
    transform:translateY(-2px);
    border-color:rgba(124,58,237,.4);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.user{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar{
    width:34px;
    height:34px;
    font-size:13px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--purple),var(--blue));
    font-weight:700;
}

.author{
    font-weight:700;
}

.location{
    color:var(--muted);
    font-size:13px;
}

.time{
    color:var(--muted);
    font-size:13px;
}

.content{
    background:rgba(0,0,0,.25);
    padding:10px;
    font-size:14px;
    border-radius:12px;
    line-height:1.6;
    word-break:break-word;
}

.footer{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    color:#64748b;
    font-size:12px;
}

.source-link{
    color:#a78bfa;
    text-decoration:none;
    font-weight:700;
}

.source-link:hover{
    color:#c4b5fd;
    text-decoration:underline;
}

.empty{
    text-align:center;
    padding:60px;
    color:var(--muted);
}

.loading{
    text-align:center;
    padding:40px;
}

@media(max-width:768px){

    .stats{
        grid-template-columns:1fr;
    }

    .toolbar{
        flex-direction:column;
        gap:10px;
        align-items:stretch;
    }

    .search{
        width:100%;
    }

    .top{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <div class="title">📨 Discord Messages</div>
            <div class="subtitle">
                Messages stored in SQLite database
            </div>
        </div>

        <a href="/" class="back-btn">
            Dashboard
        </a>
    </div>

    <div class="stats">

        <div class="stat">
            <div class="stat-value" id="totalMessages">0</div>
            <div class="stat-label">Total Messages</div>
        </div>

        <div class="stat">
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">Unique Users</div>
        </div>

        <div class="stat">
            <div class="stat-value" id="totalServers">0</div>
            <div class="stat-label">Servers</div>
        </div>

    </div>

    <div class="toolbar">

        <input
            type="text"
            class="search"
            id="searchInput"
            placeholder="Search messages..."
        >

        <div class="refresh">
            Auto refresh every 5 seconds
        </div>

    </div>

    <div id="messages" class="messages">
        <div class="loading">Loading messages...</div>
    </div>

</div>

<script>

let allMessages = [];

async function loadMessages(){

    try{

        const response = await fetch('/api/messages');
        const messages = await response.json();

        allMessages = messages;

        document.getElementById('totalMessages').textContent =
            messages.length;

        document.getElementById('totalUsers').textContent =
            new Set(messages.map(m => m.author)).size;

        document.getElementById('totalServers').textContent =
            new Set(messages.map(m => m.guild)).size;

        renderMessages(messages);

    }
    catch(error){

        console.error(error);

        document.getElementById('messages').innerHTML = `
            <div class="empty">
                Failed to load messages
            </div>
        `;
    }
}

function renderMessages(messages){

    const container =
        document.getElementById('messages');

    if(messages.length === 0){

        container.innerHTML = `
            <div class="empty">
                No messages found
            </div>
        `;

        return;
    }

    container.innerHTML = messages.map(msg => {

        const initials =
            (msg.author || '?')
            .substring(0,2)
            .toUpperCase();

        const time =
            new Date(msg.timestamp)
            .toLocaleString();
        const sourceLink = msg.source_url
            ? `<a class="source-link" href="${escapeAttr(msg.source_url)}" target="_blank" rel="noopener noreferrer">Go to source</a>`
            : `<span>Source unavailable</span>`;

        return `

            <div class="message-card">

                <div class="top">

                    <div class="user">

                        <div class="avatar">
                            ${initials}
                        </div>

                        <div>

                            <div class="author">
                                ${escapeHtml(msg.author)}
                            </div>

                            <div class="location">
                                ${escapeHtml(msg.guild)}
                                •
                                #${escapeHtml(msg.channel)}
                            </div>

                        </div>

                    </div>

                    <div class="time">
                        ${time}
                    </div>

                </div>

                <div class="content">
                    ${escapeHtml(msg.content)}
                </div>

                <div class="footer">

                    <span>
                        Message ID: ${msg.id}
                    </span>

                    ${sourceLink}

                </div>

            </div>

        `;

    }).join('');
}

function escapeHtml(text){

    if(!text) return '';

    return text
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

function escapeAttr(text){

    return escapeHtml(text || '')
        .replace(/'/g,'&#39;');
}

document
.getElementById('searchInput')
.addEventListener('input', function(){

    const term =
        this.value.toLowerCase();

    const filtered =
        allMessages.filter(msg =>
            msg.content.toLowerCase().includes(term) ||
            msg.author.toLowerCase().includes(term) ||
            msg.guild.toLowerCase().includes(term)
        );

    renderMessages(filtered);
});

loadMessages();

setInterval(loadMessages, 5000);

</script>

</body>
</html>
